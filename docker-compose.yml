version: "3.9"
services:
  mongodb:
    image: mongo:7
    container_name: bitlinks_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
  frontend:
    image: ${IMAGE_NAME}:${IMAGE_TAG}
    container_name: bitlinks_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      NEXT_PUBLIC_HOST: http://3.130.138.12:3000
    depends_on:
      mongodb:
        condition: service_healthy
volumes:
  mongo_data:
