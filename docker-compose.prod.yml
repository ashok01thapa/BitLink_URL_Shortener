services:
  # ---------------- App ----------------
  mongodb:
    image: mongo:7
    container_name: bitlinks_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    image: ${IMAGE_NAME}:${IMAGE_TAG}
    container_name: bitlinks_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      NEXT_PUBLIC_HOST: http://3.130.138.12:3000
    depends_on:
      mongodb:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: bitlinks_prometheus
    restart: unless-stopped
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
      - source: prometheus_alert_rules
        target: /etc/prometheus/alert.rules.yml
    volumes:
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: bitlinks_alertmanager
    restart: unless-stopped
    configs:
      - source: alertmanager_config
        target: /etc/alertmanager/alertmanager.yml
    volumes:
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    ports:
      - "9093:9093"

  grafana:
    image: grafana/grafana:11.2.0
    container_name: bitlinks_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_USERS_ALLOW_SIGN_UP: "false"
    configs:
      - source: grafana_datasource
        target: /etc/grafana/provisioning/datasources/datasource.yml
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: bitlinks_node_exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    ports:
      - "9100:9100"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: bitlinks_cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8080:8080"

  mongodb-exporter:
    image: percona/mongodb_exporter:0.42
    container_name: bitlinks_mongodb_exporter
    restart: unless-stopped
    command:
      - "--mongodb.uri=mongodb://mongodb:27017"
      - "--collect-all"
    ports:
      - "9216:9216"
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongo_data:
  prometheus_data:
  alertmanager_data:
  grafana_data:

configs:
  prometheus_config:
    content: |
      global:
        scrape_interval: 15s
        evaluation_interval: 15s

      alerting:
        alertmanagers:
          - static_configs:
              - targets: ["alertmanager:9093"]

      rule_files:
        - "/etc/prometheus/alert.rules.yml"

      scrape_configs:
        - job_name: "prometheus"
          static_configs:
            - targets: ["localhost:9090"]

        - job_name: "node-exporter"
          static_configs:
            - targets: ["node-exporter:9100"]

        - job_name: "cadvisor"
          static_configs:
            - targets: ["cadvisor:8080"]

        - job_name: "mongodb-exporter"
          static_configs:
            - targets: ["mongodb-exporter:9216"]

  prometheus_alert_rules:
    content: |
      groups:
        - name: infrastructure
          rules:
            - alert: HostHighCpuLoad
              expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: 'High CPU load on {{ $labels.instance }}'
                description: 'CPU usage is above 85% for 5 minutes (current value: {{ $value | printf "%.1f" }}%).'

            - alert: HostOutOfMemory
              expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 < 15
              for: 5m
              labels:
                severity: critical
              annotations:
                summary: 'Host memory nearly exhausted on {{ $labels.instance }}'
                description: 'Available memory is below 15% (current value: {{ $value | printf "%.1f" }}%).'

            - alert: HostOutOfDiskSpace
              expr: (node_filesystem_avail_bytes{mountpoint="/rootfs"} / node_filesystem_size_bytes{mountpoint="/rootfs"}) * 100 < 10
              for: 10m
              labels:
                severity: critical
              annotations:
                summary: "Low disk space on {{ $labels.instance }}"
                description: "Root filesystem has less than 10% free space."

        - name: containers
          rules:
            - alert: ContainerDown
              expr: absent(container_last_seen{name=~"bitlinks_frontend|bitlinks_mongodb"})
              for: 1m
              labels:
                severity: critical
              annotations:
                summary: "Container {{ $labels.name }} is not reporting"
                description: "cAdvisor has not seen this container in the last minute — it may have crashed or stopped."

            - alert: ContainerHighMemoryUsage
              expr: (sum(container_memory_usage_bytes{name=~"bitlinks_.*"}) by (name) / sum(container_spec_memory_limit_bytes{name=~"bitlinks_.*"} > 0) by (name)) * 100 > 90
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: "Container {{ $labels.name }} is close to its memory limit"
                description: "Memory usage is above 90% of the configured limit."

        - name: mongodb
          rules:
            - alert: MongoDown
              expr: mongodb_up == 0
              for: 1m
              labels:
                severity: critical
              annotations:
                summary: "MongoDB is down"
                description: "mongodb_exporter cannot reach the MongoDB instance."

            - alert: MongoHighConnections
              expr: mongodb_connections{state="current"} > 400
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: "MongoDB connection count is high"
                description: "Current connections have exceeded 400 for 5 minutes."

  alertmanager_config:
    content: |
      global:
        resolve_timeout: 5m
        smtp_smarthost: 'smtp.gmail.com:587'
        smtp_from: 'alerts@bitlinks.example.com'
        smtp_auth_username: 'alerts@bitlinks.example.com'
        smtp_auth_password: '${SMTP_APP_PASSWORD}'
        smtp_require_tls: true

      route:
        receiver: default-email
        group_by: ['alertname', 'severity']
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 3h
        routes:
          - match:
              severity: critical
            receiver: critical-alerts
            repeat_interval: 30m
          - match:
              severity: warning
            receiver: default-email

      receivers:
        - name: default-email
          email_configs:
            - to: 'mgr.axok@gmail.com'
              send_resolved: true

        - name: critical-alerts
          email_configs:
            - to: 'mgr.axok@gmail.com'
              send_resolved: true

      inhibit_rules:
        - source_match:
            severity: 'critical'
          target_match:
            severity: 'warning'
          equal: ['alertname', 'instance']

  grafana_datasource:
    content: |
      apiVersion: 1

      datasources:
        - name: Prometheus
          type: prometheus
          access: proxy
          url: http://prometheus:9090
          isDefault: true
          editable: true
